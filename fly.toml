app = "tiny"
primary_region = "iad"

[build]

[deploy]
  release_command = "flask db upgrade"

[env]
  FLASK_APP = "tiny.app:create_app"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
